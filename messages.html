<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .message {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Received Messages</h1>
<div id="messages"></div>

<script>
fetch('/messages')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('messages');

    data.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
            <b>Name:</b> ${msg.name}<br>
            <b>Email:</b> ${msg.email}<br>
            <b>Message:</b> ${msg.message}
        `;
        container.appendChild(div);
    });
});
</script>

</body>
</html>
