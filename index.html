<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nimmy Rose Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 💕 Floating hearts -->
<div class="hearts"></div>

<!-- 🌸 Main container -->
<div class="container">

    <h1 class="fade-in">Nimmy Rose 💗</h1>
    <h3 class="fade-in">BCA Cloud Computing</h3>
    <p class="fade-in">Kristu Jayanti Deemed To Be University</p>

    <!-- 👩‍💻 About -->
    <div class="section fade-in">
        <h2>About Me</h2>
        <p>I am a BCA Cloud Computing student passionate about technology, web development and creating beautiful websites ✨</p>
    </div>

    <!-- 💻 Skills -->
    <div class="section fade-in">
        <h2>Skills</h2>
        <ul>
            <li>HTML & CSS 💕</li>
            <li>JavaScript ✨</li>
            <li>Cloud Basics ☁️</li>
            <li>Git & GitHub 🔥</li>
        </ul>
    </div>

    <!-- 💌 Contact Form -->
    <div class="section fade-in">
        <h2>Contact Me</h2>

        <form id="contactForm">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message 💌</button>
        </form>
    </div>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.querySelector('input[name="name"]').value;
    const email = document.querySelector('input[name="email"]').value;
    const message = document.querySelector('textarea[name="message"]').value;

    await fetch("/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, message })
    });

    alert("Message sent successfully! 💗");
});
</script>

</body>
</html>
